name: Staging Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  staging-tests:
    name: ${{ matrix.test-file }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        test-file:
          - tests/test_assistant_workflow.py
          - tests/test_audio_sale_workflow.py
          - tests/test_bot_mistake_workflow.py
          - tests/test_confirmation_workflow.py
          - tests/test_late_language_choice.py
          - tests/test_localizations.py
          - tests/test_onboarding_workflow.py
          - tests/test_price_overflow.py
          - tests/test_text_sale_workflow.py
          - tests/test_waitlist_duplicate_approval.py
          - tests/test_waitlist_duplicate_sid.py

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run staging tests
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          META_WHATSAPP_APP_SECRET: ${{ secrets.META_WHATSAPP_APP_SECRET }}
        run: pytest -v ${{ matrix.test-file }}
