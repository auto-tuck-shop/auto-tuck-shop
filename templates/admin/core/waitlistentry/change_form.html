{% extends "admin/change_form.html" %}
{% load i18n %}

{% block submit_buttons_bottom %}
  {{ block.super }}
  {% if show_approve_reject %}
    <div class="submit-row" style="margin-top: 1em; padding: 12px 14px; border-top: 1px solid #ddd;">
      <strong style="margin-right: 1em;">Waitlist Actions:</strong>
      <input type="submit" name="_approve" value="✅ Approve &amp; Send Welcome"
             style="background: #417690; color: white; padding: 6px 15px; border: none; border-radius: 4px; cursor: pointer; margin-right: 8px;"
             onclick="return confirm('This will create a company, user account, and send a WhatsApp welcome message. Continue?');">
      <input type="submit" name="_reject" value="❌ Reject"
             style="background: #ba2121; color: white; padding: 6px 15px; border: none; border-radius: 4px; cursor: pointer;"
             onclick="return confirm('Reject this waitlist entry?');">
    </div>
  {% endif %}
{% endblock %}
