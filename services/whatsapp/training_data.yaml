      - "show me things sold today"
      - "zvinhu zvatengeswa nhasi"
      - "zvinhu zvafamba sei nhasi"
      - "mari yaita sei today"
      - "takatengesa zvakadii"
      - "what happened today"
      - "what sold today"
      - "what is left today"
      - "zvinhu zvese zvatengesa"
      - "what sold most"
      - "what happened last night"
      - "what happened this morning"
      - "mashoko ebhizinesi ari sei"
      - "bhizinesi riri kufamba sei"
      - "mari yanhasi"
      - "chii chaitika nhasi"

      # Multilingual (Shona)
      - "Ndezvipi zvakatengeswa zvakanyanya nhasi?"  # What sold most today?
      - "Takatengesa zvakadii nhasi?"  # How much did we sell today?
      - "Chii chasara nhasi?"  # What is left today?

  - intent_id: "shop.closing"
    canonical_name: "Set Closing Time / End Day"
