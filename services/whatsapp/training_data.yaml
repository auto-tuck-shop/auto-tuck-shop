---
# Training Data for Tuck Shop Sales & Business Intent Recognition
# Supports English and Shona (Zimbabwe)

intents:
  - intent_id: "sales.record"
    canonical_name: "Record Sale"
    description: "User is recording a completed transaction with items, quantities, and/or prices"
    synonyms:
      - "sale"
      - "transaction"
      - "record"
      - "add"
      - "capture"
      - "log"
    training_utterances:
      # Basic English
      - "I sold 3 breads"
      - "2 Cokes, 1 chips"
      - "Sold 1 Coke for R20"
      - "Someone bought Coke for R20"
      - "Customer bought 5 loaves"
      - "Add sale: 2 chips and 1 cooldrink"
      - "Record R150 cash sale"
      - "Customer paid by card"
      - "Purchased 3 waters"
      - "Put this in today's sales"
      - "Add to today's report"
      - "Take this down"

      # Expanded: many informal, short, and variant phrasings
      - "Sold 3"
      - "sold 3 breads"
      - "3 sold bread"
      - "3x bread"
      - "3x breads"
      - "3 bread"
      - "bread x3"
      - "sold bread 3"
      - "sold 3 @ R10"
      - "3@R10"
      - "3 @ R10 each"
      - "3 at R10 each"
      - "3 for R30"
      - "R30 for 3"
      - "R30 total for 3 bread"
      - "3 bread R30"
      - "3 bread R10 each"
      - "3 bread 10 rand each"
      - "3 bread 10ea"
      - "3 bread 10/each"
      - "3 bread @10"
      - "sold 2 cokes for 40"
      - "2 cokes for R40"
      - "2 cokes R40 total"
      - "2 cokes R20 each"
      - "2 cakes @100"
      - "sold for R100"
      - "sold 3 for 100"
      - "i sold three breads now"
      - "i just sold 3 breads"
      - "just sold 1"
      - "sold out of bread"
      - "we sold out"
      - "cash sale 50"
      - "card sale 200"
      - "paid via ecocash 150"
      - "ecocash payment 150"
      - "mobile money paid 100"
      - "customer paid with mobile money"
      - "cust paid by card"
      - "paid with card"
      - "customer paid cash"
      - "R100 cash"
      - "R100 received"
      - "received 100 rand"
      - "collected 200"

      # Voice transcription artifacts & self-corrections
      - "um i sold 3 breads"
      - "uh sold three bread"
      - "i sold two no three breads"
      - "i sold two actually three"
      - "one chips, I mean two chips"

      # Price-first phrasing
      - "R150 for 5 loaves"
      - "R150 total, 5 loaves"
      - "R20 each for 3 cokes"

      # Ranges and approximate
      - "sold 2-3 cokes"
      - "about 5 breads sold"
      - "approx 5 breads"

      # Short messages / SMS style
      - "sold"
      - "sale 3"
      - "add 3 bread"
      - "add sale 3x bread"
      - "log 2 cokes"

      # Mixed/Code-switching with Shona words
      - "Vendi 3 pani R60"
      - "Vendi 2 cokes R20 each"
      - "Akabvunza 4 pani"
      - "Vendi 1 bread"
      - "Takapedza 3 pani"

      # Ambiguous / missing pieces (for clarification flows)
      - "I sold"
      - "sold 3"
      - "3 for"
      - "for 100"

      # Edge: decimals and cents
      - "3 bread R99.50"
      - "1 coke R12.50"

      # Informal / Slang / Text speak
      - "i sold 3 breads"
      - "sld 2 cokes"
      - "selled 1 water"
      - "just sold bread"
      - "sold out of bread"
      - "cash sale 30"
      - "paid r20"
      - "paid R20"
      - "ivl sold 2 sodas"
      - "just now sold 1 chip"

      # Spelling mistakes & typos
      - "Cole 2"  # Coke
      - "bret 3"  # bread
      - "coldrink 1"  # cooldrink
      - "shugar 2"  # sugar
      - "watar 5"  # water

      # Numbers spelled out or mixed
      - "sold three breads"
      - "two cokes and five waters"
      - "1 bread, 2 sugars, three chips"
      - "five x bread"
      - "3x colas"

      # Quantity + Price (unit price)
      - "3 bread R50 each"
      - "2 cakes at 100 rand each"
      - "5 loaves, one hundred per loaf"
      - "1 cooldrink per 25 rand"
      - "Coke every single R20"
      - "3 mazai $2 each"
      - "2 water - 15 rand apiece"
      - "4 chips, 20 rand individually"

      # Total price (no per-unit indicator)
      - "3 bread R100"
      - "2 cokes R40"
      - "5 loaves for R250"
      - "sold 1 cake R120"

      # No quantity
      - "Sold bread"
      - "Sold Coke"
      - "Customer purchased water"

      # Payment method variations
      - "Cash sale: 2 breads R100"
      - "Card payment: 3 chips R75"
      - "Customer paid: R50 cash"
      - "EFT: R200 for cakes"
      - "Paid by card"

      # Multilingual (Shona)
      - "Vendi 2 pani"  # Sold 2 bread
      - "Akabvunza 3 cokes"  # Customer bought 3 cokes
      - "Vendi 5 vhu (sugar)"
      - "Vara vhu (out of sugar)"

      # Code-switching
      - "Sold 2 cokes, by card please"
      - "I sold 3 pani for R50 each"
      - "Vendi 5 cokes, R20 each"
      - "Customer bought bread at R100, cash sale"
      - "So akabvunza 2 cooldrinks at R15 each"

      # Ambiguous (needs clarification)
      - "I sold 3"  # Missing product name
      - "Sold for R100"  # Missing quantity/product
      - "5 at R20"  # Unclear what product
      - "Customer bought"  # Missing all details

      # Edge cases
      - "Bread R50, R50 for bread"  # Likely total, not unit
      - "1 item R200"  # Generic item name
      - "Add: 2-3 cokes"  # Range indicated
      - "Approximately 5 breads"  # Approximate quantity

