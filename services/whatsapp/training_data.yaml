# Slot / Entity definitions
slots:
  quantity:
    type: "number"
    examples:
      - "3"
      - "three"
      - "5x"
      - "1"
    extractors:
      - pattern: "[0-9]+"
      - pattern: "\\b(one|two|three|four|five|six|seven|eight|nine|ten)\\b"
      - pattern: "[0-9]+x"

  product_name:
    type: "string"
    examples:
      - "bread"
      - "coke"
      - "chips"
      - "water"
      - "cooldrink"
      - "pani"
      - "sugar"
      - "salt"
    normalized_synonyms:
      bread:
        - "bread"
        - "loaf"
        - "loaves"
        - "pani"  # Shona
        - "pani"
      coke:
        - "coke"
        - "cola"
        - "cool drink"
        - "cooldrink"
        - "cold drink"
        - "cok"
        - "coke"
      chips:
        - "chips"
        - "crisp"
        - "crisps"
        - "lays"
      water:
        - "water"
        - "waters"
        - "amanzi"  # Zulu
      sugar:
        - "sugar"
        - "shugar"  # Misspelling
        - "vhu"  # Shona
      salt:
        - "salt"
        - "munyu"  # Shona
      egg:
        - "egg"
        - "eggs"
        - "mazai"
        - "mazi"
      sweets:
        - "sweets"
        - "maputi"
      drink:
        - "drink"
        - "drinks"
        - "cooldrink"
        - "cool drink"

  total_amount:
    type: "currency"
    description: "Total sale amount for one or more items"
    examples:
      - "R100"
      - "100 rand"
      - "$20"
      - "ZAR 50"
      - "250"

  unit_price:
    type: "currency"
    description: "Price per individual item (requires per-unit cue: each, per, apiece, individually, etc.)"
    examples:
      - "R20 each"
      - "$2 per item"
      - "100 rand individually"
      - "15 apiece"
    per_unit_cues:
      - "each"
      - "per"
      - "apiece"
      - "individually"
      - "every single"
      - "one by one"
      - "respectively"
      - "any one"
      - "particular"
      - "separate"
      - "single"
      - "imwe"  # Shona: one (per-unit)

  currency:
    type: "string"
    example_values:
      - "R"  # South African Rand
      - "ZAR"
      - "rand"
      - "ZWL"  # Zimbabwe Dollar
      - "USD"
      - "$"
    normalized_to:
      - "ZAR"  # South African Rand
      - "ZWL"  # Zimbabwe Dollar
      - "USD"

  payment_method:
    type: "enum"
    values:
      - "cash"
      - "card"
      - "eft"
      - "mobile_money"
      - "cheque"
    keywords:
      cash:
        - "cash"
        - "cash sale"
      card:
        - "card"
        - "card payment"
        - "credit card"
        - "debit card"
      eft:
        - "eft"
        - "electronic transfer"
      mobile_money:
        - "mobile money"
        - "mtn money"
        - "ecocash"
        - "onemoney"

  time_reference:
    type: "string"
    preset_values:
      - "today"
      - "yesterday"
      - "this week"
      - "last week"
      - "this month"
      - "morning"
      - "afternoon"
      - "evening"
    dynamic_patterns:
      - "since <time>"
      - "from <time> to <time>"
      - "between <time> and <time>"
      - "last <number> hours"
      - "last <number> days"

# Normalization rules
normalization:
  # Numbers: convert words to digits
  number_words:
    one: 1
    two: 2
    three: 3
    four: 4
    five: 5
    six: 6
    seven: 7
    eight: 8
    nine: 9
    ten: 10

  # Currency normalization
  currency_symbols:
    "R": "ZAR"
    "rand": "ZAR"
    "zar": "ZAR"
    "$": "USD"
    "usd": "USD"

  # Common misspellings (edit distance <= 2)
  common_typos:
    "cole": "coke"
    "colla": "cola"
    "bret": "bread"
    "coladrink": "cooldrink"
    "watar": "water"
    "shugar": "sugar"
    "sld": "sold"
    "cok": "coke"
    "cokc": "coke"
    "cok e": "coke"
    "dringks": "drinks"
    "drinks": "drinks"
    "mazie": "mazai"
    "mazie": "mazai"

  # Contractions & abbreviations
  contractions:
    "c u": "see you"
    "2morrow": "tomorrow"
    "b4": "before"
    "thru": "through"

